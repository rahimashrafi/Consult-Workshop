# =============================================================================
# SOURCES — the news feeds your briefing reads every day.
#
# SECTIONS:
#   rss_feeds           — core daily sources (fetched every run)
#   social              — Twitter/X accounts via RSSHub (optional, see README)
#   serendipity_sources — a pool randomly sampled each run (3 per day by default)
#
# HOW TO ADD A SOURCE:
#   Option A (easiest): use the "Add source" workflow in the Actions tab.
#     Paste any website URL — it auto-discovers the RSS feed and adds it here.
#   Option B: add an entry manually below, following the format shown.
#
# FINDING RSS FEED URLS:
#   Most news sites expose a feed at /feed, /rss, or /feed.xml
#   Try:  https://www.theguardian.com/world/rss
#         https://techcrunch.com/feed/
#   Or use a feed finder: https://feedsearch.dev/
#
# EACH ENTRY NEEDS:
#   name     : display name shown in the briefing and dashboard
#   url      : full RSS/Atom feed URL
#   category : free-form label for your own organisation (does not affect scoring)
#   language : 'en' or 'nl' (for display only — does not filter articles)
# =============================================================================

rss_feeds:

  # ── General AI / technology news ────────────────────────────────────────────

  - name: MIT Technology Review
    url: https://www.technologyreview.com/feed/
    category: ai_research
    language: en

  - name: The Verge
    url: https://www.theverge.com/rss/index.xml
    category: tech_news
    language: en

  - name: Wired
    url: https://www.wired.com/feed/rss
    category: tech_news
    language: en

  - name: The Batch — DeepLearning.ai (Andrew Ng)
    url: https://www.deeplearning.ai/the-batch/feed.xml
    category: ai_newsletter
    language: en

  # ── AI policy / governance ───────────────────────────────────────────────────

  - name: OECD AI Policy Observatory
    url: https://wp.oecd.ai/feed/
    category: ai_policy
    language: en

  - name: Politico EU — Tech & AI
    url: https://www.politico.eu/tag/artificial-intelligence/feed/
    category: eu_policy
    language: en

  - name: AI Snake Oil (Narayanan & Kapoor)
    url: https://aisnakeoil.substack.com/feed
    category: ai_newsletter
    language: en

  # ── European tech & startups ─────────────────────────────────────────────────

  - name: Sifted
    url: https://sifted.eu/feed
    category: eu_startup_vc
    language: en

  - name: Tech.eu
    url: https://tech.eu/feed/
    category: eu_startup_vc
    language: en

  # ── AI newsletters ───────────────────────────────────────────────────────────

  - name: Exponential View (Azeem Azhar)
    url: https://www.exponentialview.co/feed
    category: ai_newsletter
    language: en

  # ── Add your own sources below ───────────────────────────────────────────────
  # Replace or supplement the examples above with feeds relevant to YOUR topic.
  #
  # - name: Source Name
  #   url: https://example.com/feed
  #   category: your_category
  #   language: en


# =============================================================================
# TWITTER / X SOCIAL MONITORING
#
# The RSSHub instance URL comes from the RSSHUB_INSTANCE secret you add in
# GitHub — you don't need to put the URL here. Your instructor will give you
# that URL during the workshop.
#
# Add the Twitter/X accounts you want to follow below. Pick people who are
# relevant to your research topic: researchers, journalists, policy makers,
# whoever. You can always add more later.
# =============================================================================

social:
  twitter_accounts:
    # These are just examples — swap them out for people relevant to your topic.
    - handle: ylecun
      name: Yann LeCun
      relevance_hint: AI research, Meta, open-source AI debates
    - handle: AndrewYNg
      name: Andrew Ng
      relevance_hint: AI industry, education, startup ecosystem
    - handle: sama
      name: Sam Altman
      relevance_hint: AI industry, OpenAI, regulation views
    - handle: GaryMarcus
      name: Gary Marcus
      relevance_hint: AI critique, policy, safety
    - handle: Thom_Wolf
      name: Thomas Wolf
      relevance_hint: Co-founder Hugging Face, open-source AI
    - handle: arthurmensch
      name: Arthur Mensch
      relevance_hint: CEO Mistral AI, open-source LLMs, European AI
    - handle: BenediktEvans
      name: Benedict Evans
      relevance_hint: Tech industry analysis, AI impact on business


# =============================================================================
# SERENDIPITY POOL
#
# These sources are NOT fetched every day. Each run randomly picks a small
# number (default: 3, set via SERENDIPITY_N) from this pool.
# Good candidates: think tanks, newsletters, academic feeds, niche outlets.
# Start with a handful and add more as you discover relevant sources.
# =============================================================================

