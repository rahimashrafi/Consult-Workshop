core_focus: |
  Focus heavily on cryptocurrency, Forex, and macro-economic markets. Track high-impact volatility drivers, central bank interest rate decisions (especially the US Federal Reserve), regulatory changes, institutional capital flows, and major on-chain data anomalies. The main goal is to capture market-moving news and sentiment shifts that can be utilized for short-to-medium-term swing trading, scalping, and risk management, while strictly filtering out general retail noise, clickbait price predictions, and repetitive post-event summaries.

themes:
  - Macro-economic Policy & Central Banks (Fed, ECB, inflation data, interest rates)
  - Crypto Regulatory Frameworks & SEC Decisions
  - Institutional Adoption (ETF inflows/outflows, corporate treasury buying)
  - Crypto Volatility & Major On-chain Metrics (Large exchange inflows/outflows, whale movements, liquidations)
  - Forex Market Liquidity & Geopolitical Risk Impacts (DXY, EUR/USD, safe-haven flows)

tier_1_description: |
  An article or report is Tier 1 (Perfect Relevance) if it contains actionable, high-impact data or breaking news capable of causing immediate or significant structural market shifts. Examples include unexpected central bank rate changes, major regulatory crackdowns or approvals (like crypto ETFs), sudden massive whale liquidations, or institutional shifts affecting core liquidity. The content must provide deep insight, precise numbers, or structural news rather than generic market commentary.
